name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main", "v1.x"]
  pull_request:
    branches: ["main", "v1.x"]
  pull_request_target:
    types: [labeled, unlabeled]
    branches: ["main", "v1.x"]

permissions:
  contents: read # This is required for actions/checkout

# Cancel when pull request is updated
concurrency:
  group: ${{ github.head_ref || github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  lint-commits:
    # Note: To re-run `lint-commits` after fixing the PR title, close-and-reopen the PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"
      - name: Check PR title
        run: |
          node "$GITHUB_WORKSPACE/.github/workflows/lintcommit.js"

  build:
    needs: lint-commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-artifacts
          path: |
            packages/**/dist*/*
            package.json
            package-lock.json

  unit-tests:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.x", "24.x"]
    uses: "./.github/workflows/unit-tests.yml"
    with:
      node-version: ${{ matrix.node-version }}

  integration-tests:
    needs: build
    # Skip integration tests for PRs from forked repos (no access to secrets)
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.x", "24.x"]
    uses: "./.github/workflows/integration-tests.yml"
    with:
      node-version: ${{ matrix.node-version }}
    secrets: inherit

  capacity-provider-tests:
    needs: build
    # Skip for PRs from forked repos (no access to secrets)
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write
    uses: "./.github/workflows/capacity-provider-tests.yml"
    with:
      node-version: "24.x"
    secrets: inherit

  # Always succeed for external PRs to allow merging
  external-pr-status:
    if: github.event.pull_request.head.repo.full_name != github.repository && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
    runs-on: ubuntu-latest
    steps:
      - name: External PR Status
        run: |
          echo "✅ External PR - Integration tests skipped for security"
          echo "Maintainer: Add 'safe-to-merge' label and use squash & merge"
      - name: Check for bypass label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const hasBypassLabel = labels.includes('safe-to-merge');

            if (hasBypassLabel) {
              console.log('✅ Maintainer approved bypass with safe-to-merge label');
            } else {
              console.log('⚠️  No bypass label - PR cannot be merged until maintainer adds safe-to-merge label');
              core.setFailed('External PR requires maintainer approval via safe-to-merge label');
            }
